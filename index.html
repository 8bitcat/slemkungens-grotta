<script>
'use strict';
// ===================== GRUND =====================
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const VW = 960, VH = 540, TS = 32;

function fitCanvas(){
  const s = Math.min(window.innerWidth/VW, window.innerHeight/VH);
  cv.style.width = Math.floor(VW*s)+'px';
  cv.style.height = Math.floor(VH*s)+'px';
}
window.addEventListener('resize', fitCanvas); fitCanvas();
cv.focus();
cv.addEventListener('pointerdown', ()=>{ cv.focus(); initAudio(); });

function mulberry32(seed){
  let a = seed>>>0;
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a>>>15, 1 | a);
    t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
const dist = (ax,ay,bx,by)=>Math.hypot(bx-ax, by-ay);
const clamp = (v,a,b)=>v<a?a:(v>b?b:v);
const lerp = (a,b,t)=>a+(b-a)*t;
function angDiff(a,b){ let d=(b-a)%(Math.PI*2); if(d>Math.PI)d-=Math.PI*2; if(d<-Math.PI)d+=Math.PI*2; return d; }

// ===================== NÄTVERK (mobiler som handkontroller) =====================
const URLQ = new URLSearchParams(location.search);
const HASPEER = typeof window.Peer !== 'undefined';
const IS_TOUCH = 'ontouchstart' in window;
let MODE = 'host';
if(URLQ.get('room')) MODE = 'ctrl';
else if(HASPEER && IS_TOUCH && Math.min(window.innerWidth, window.innerHeight) < 620) MODE = 'choose';
const NET = { mode:'none', peer:null, ctrls:{}, code:'', open:false, nextIdx:0, lastPush:0 };

function netCtrlIds(){ return Object.keys(NET.ctrls).filter(id=>NET.ctrls[id].alive); }
function makeCode(){ const A='abcdefghjkmnpqrstuvwxyz23456789'; let s=''; for(let i=0;i<4;i++) s+=A[(Math.random()*A.length)|0]; return s; }
function startHost(){
  if(!HASPEER || NET.mode==='host') return;
  NET.mode = 'host';
  let tries = 0;
  const attempt = ()=>{
    NET.code = makeCode();
    const peer = new Peer('slemkung-'+NET.code, ICE_OPTS);
    NET.peer = peer;
    peer.on('open', ()=>{ NET.open = true; updateQR(); });
    peer.on('disconnected', ()=>{ try{ peer.reconnect(); }catch(e){} });
    peer.on('error', err=>{
      if(err && err.type==='unavailable-id' && tries++ < 5){ try{ peer.destroy(); }catch(e){} attempt(); }
      // andra fel (t.ex. offline): spela vidare lokalt utan nätspel
    });
    peer.on('connection', conn=>{
      conn.on('open', ()=>{
        // återta en övergiven mobilplats om någon tappat anslutningen
        const allIds = [...joiners.map(j=>j.ctrlId), ...players.map(p=>p.ctrlId)];
        let id = allIds.find(cid=>cid && cid[0]==='n' && (!NET.ctrls[cid] || !NET.ctrls[cid].alive));
        if(!id) id = 'n'+(NET.nextIdx++);
        NET.ctrls[id] = { conn, alive:true, state:{x:0,y:0,attack:false,special:false} };
        conn.on('data', d=>{
          if(d && d.t==='i' && NET.ctrls[id]){
            const s = NET.ctrls[id].state;
            const nx = +d.x||0, ny = +d.y||0, na = !!d.a, ns = !!d.s;
            // latcha snabba tryck så de aldrig faller mellan två bildrutor
            if(na && !s.attack) s.aL = true;
            if(ns && !s.special) s.sL = true;
            if(nx!==0 && s.x===0) s.xL = nx;
            s.x = nx; s.y = ny; s.attack = na; s.special = ns;
          }
        });
        const drop = ()=>{ if(NET.ctrls[id] && NET.ctrls[id].conn===conn){ NET.ctrls[id].alive=false; NET.ctrls[id].state={x:0,y:0,attack:false,special:false}; } };
        conn.on('close', drop); conn.on('error', drop);
      });
    });
  };
  attempt();
}
function netSend(id, msg){ const c = NET.ctrls[id]; if(c && c.alive){ try{ c.conn.send(msg); }catch(e){} } }
function pushStatus(){
  if(NET.mode!=='host') return;
  if(time - NET.lastPush < 0.3) return;
  NET.lastPush = time;
  for(const id of netCtrlIds()){
    let msg = { t:'you', st:'lobby' };
    const ji = joiners.findIndex(j=>j.ctrlId===id);
    if(ji>=0){
      const n = (state==='select' ? ji : players.length+ji) + 1;
      msg = { t:'you', st:'select', n, color:PCOLORS[(n-1)%5], cls:CLASSES[joiners[ji].ci].name, ready:joiners[ji].ready };
    } else if(state!=='select'){
      const p = players.find(q=>q.ctrlId===id);
      if(p) msg = { t:'you', st:state, n:p.id+1, color:p.color, cls:p.cls.name, hp:p.hp, maxhp:p.maxhp, cd:1-p.cdS/pCd(p), downed:p.downed };
    }
    netSend(id, msg);
  }
}
const qrPanel = document.getElementById('qrPanel');
// Publika adressen används alltid i QR/länkar — rummet kopplas via PeerJS-molnet,
// så mobiler når värden även när värdsidan körs från localhost.
const PUBLIC_URL = 'https://8bitcat.github.io/slemkungens-grotta/';
// STUN + TURN-relä: krävs när direktkoppling blockeras (client isolation på
// routern, mobildata, eller VPN-adaptrar på värddatorn)
const ICE_OPTS = { config: { iceServers: [
  { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] },
  { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
] } };
function joinLink(){
  const base = location.hostname==='8bitcat.github.io'
    ? location.origin + location.pathname
    : PUBLIC_URL;
  return base + '?room=' + NET.code;
}
function joinHost(){ return joinLink().replace(/^https?:\/\//,'').replace(/\?.*$/,''); }
function updateQR(){
  if(!NET.open) return;
  qrPanel.innerHTML = '<img width="150" height="150" alt="QR" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=231a30&bgcolor=f4f0e4&data='+encodeURIComponent(joinLink())+'">'
    + '<div style="margin-top:6px;font-size:12px">Skanna med mobilkameran</div>'
    + '<div style="font-size:22px;font-weight:bold;color:#f0c33c;letter-spacing:5px">'+NET.code.toUpperCase()+'</div>';
}

// ===================== INPUT =====================
const keys = {};
const PREVENT = new Set(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter','ShiftRight','KeyW','KeyA','KeyS','KeyD','KeyE']);
window.addEventListener('keydown', e=>{
  if(e.target && e.target.tagName==='INPUT') return;
  if(PREVENT.has(e.code)) e.preventDefault();
  keys[e.code] = true;
  initAudio();
  if(e.code==='KeyM'){ musicOn = !musicOn; toast(musicOn?'Musik PÅ':'Musik AV'); }
  if((e.code==='KeyP'||e.code==='Escape') && state==='play'){ paused = !paused; }
});
window.addEventListener('keyup', e=>{ keys[e.code] = false; });
window.addEventListener('blur', ()=>{ for(const k in keys) keys[k]=false; if(state==='play') paused = true; });

const KEYSETS = [
  {up:'KeyW',down:'KeyS',left:'KeyA',right:'KeyD',attack:'Space',special:'KeyE',label:'WASD · Blanksteg · E'},
  {up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',attack:'Enter',special:'ShiftRight',label:'Pilar · Enter · Hö.Shift'}
];
const ctrlPrev = {};   // id -> förra framens state
const CTRL = {};       // id -> denna framens state (med kanter)

function pads(){
  try{ return navigator.getGamepads ? navigator.getGamepads() : []; }
  catch(e){ return []; }
}
function rawCtrl(id){
  if(id[0]==='k'){
    const ks = KEYSETS[+id[1]];
    return {
      x:(keys[ks.right]?1:0)-(keys[ks.left]?1:0),
      y:(keys[ks.down]?1:0)-(keys[ks.up]?1:0),
      attack:!!keys[ks.attack], special:!!keys[ks.special], start:false
    };
  }
  if(id==='t0'){
    return {x:TCTRL.x, y:TCTRL.y, attack:TCTRL.a, special:TCTRL.s, start:false};
  }
  if(id[0]==='n'){
    const c = NET.ctrls[id];
    if(!c || !c.alive) return {x:0,y:0,attack:false,special:false,start:false};
    const st = c.state;
    let x = st.x;
    if(x===0 && st.xL) x = st.xL;
    const at = st.attack || !!st.aL, sp = st.special || !!st.sL;
    st.aL = false; st.sL = false; st.xL = 0;
    return {x, y:st.y, attack:at, special:sp, start:false};
  }
  const gp = pads()[+id.slice(1)];
  if(!gp) return {x:0,y:0,attack:false,special:false,start:false};
  let x = gp.axes[0]||0, y = gp.axes[1]||0;
  if(Math.abs(x)<0.28) x=0; if(Math.abs(y)<0.28) y=0;
  if(gp.buttons[14] && gp.buttons[14].pressed) x=-1;
  if(gp.buttons[15] && gp.buttons[15].pressed) x=1;
  if(gp.buttons[12] && gp.buttons[12].pressed) y=-1;
  if(gp.buttons[13] && gp.buttons[13].pressed) y=1;
  const b = i=>!!(gp.buttons[i] && gp.buttons[i].pressed);
  return {x, y, attack:b(0)||b(7), special:b(1)||b(2)||b(6), start:b(9)};
}
function pollInputs(){
  const ids = ['k0','k1', ...netCtrlIds()];
  if(LOCALPAD) ids.push('t0');
  const gps = pads();
  for(let i=0;i<gps.length;i++) if(gps[i]) ids.push('p'+i);
  for(const id of ids){
    const cur = rawCtrl(id);
    const prev = ctrlPrev[id] || {x:0,y:0,attack:false,special:false,start:false};
    CTRL[id] = {
      ...cur,
      aJP: cur.attack && !prev.attack,
      sJP: cur.special && !prev.special,
      stJP: cur.start && !prev.start,
      lJP: cur.x<0 && prev.x>=0,
      rJP: cur.x>0 && prev.x<=0
    };
    ctrlPrev[id] = cur;
  }
}
function C(id){ return CTRL[id] || {x:0,y:0,attack:false,special:false,start:false,aJP:false,sJP:false,stJP:false,lJP:false,rJP:false}; }

// ===================== LJUD =====================
let actx = null, sfxGain = null, musGain = null, musicOn = true;
let musNext = 0, musStep = 0;
function initAudio(){
  if(actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    sfxGain = actx.createGain(); sfxGain.gain.value = 0.5; sfxGain.connect(actx.destination);
    musGain = actx.createGain(); musGain.gain.value = 0.32; musGain.connect(actx.destination);
    musNext = actx.currentTime + 0.1;
  }catch(e){}
}
const freq = n=>440*Math.pow(2,(n-69)/12);
function tone(f0,f1,dur,type,vol,when){
  if(!actx) return;
  const t = when!==undefined?when:actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(f0,t);
  if(f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+dur+0.02);
}
function noiseSfx(dur,vol,hp){
  if(!actx) return;
  const n = actx.sampleRate*dur, buf = actx.createBuffer(1,n,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*(1-i/n);
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain(); g.gain.value = vol;
  if(hp){ const f = actx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; src.connect(f); f.connect(g); }
  else src.connect(g);
  g.connect(sfxGain); src.start();
}
function sfx(name){
  if(!actx) return;
  switch(name){
    case 'swing': noiseSfx(0.09,0.25,1800); break;
    case 'hit': tone(220,70,0.09,'square',0.25); break;
    case 'arrow': tone(900,280,0.07,'square',0.16); break;
    case 'fire': tone(180,50,0.22,'sawtooth',0.28); noiseSfx(0.18,0.18,500); break;
    case 'bolt': tone(700,1100,0.08,'triangle',0.2); break;
    case 'heal': [76,80,83,88].forEach((n,i)=>tone(freq(n),freq(n),0.14,'triangle',0.2,actx.currentTime+i*0.07)); break;
    case 'coin': tone(988,988,0.05,'square',0.16); tone(1319,1319,0.12,'square',0.16,actx.currentTime+0.05); break;
    case 'heart': tone(523,784,0.15,'triangle',0.25); break;
    case 'hurt': tone(300,90,0.16,'sawtooth',0.3); break;
    case 'edie': noiseSfx(0.14,0.22,900); tone(420,90,0.18,'triangle',0.2); break;
    case 'freeze': tone(1400,300,0.3,'triangle',0.24); break;
    case 'dash': noiseSfx(0.1,0.2,2500); break;
    case 'spin': noiseSfx(0.2,0.28,1200); tone(500,250,0.2,'square',0.15); break;
    case 'roar': tone(90,35,0.7,'sawtooth',0.5); noiseSfx(0.5,0.2,150); break;
    case 'revive': [72,76,79,84].forEach((n,i)=>tone(freq(n),freq(n),0.12,'square',0.2,actx.currentTime+i*0.09)); break;
    case 'fanfare': [72,72,72,76,79,84].forEach((n,i)=>tone(freq(n),freq(n),0.22,'square',0.25,actx.currentTime+i*0.14)); break;
    case 'lock': tone(160,80,0.3,'square',0.3); break;
    case 'shoot2': tone(300,140,0.1,'square',0.14); break;
  }
}
const MELODY = [69,0,72,74, 76,0,74,72, 69,0,67,64, 67,69,72,0, 69,0,72,76, 79,0,76,74, 72,0,74,72, 69,67,69,0];
const BASSLN = [45,0,45,0, 41,0,41,0, 43,0,43,0, 45,0,43,41, 45,0,45,0, 47,0,47,0, 48,0,48,0, 45,0,43,0];
function updMusic(){
  if(!actx || !musicOn || state==='select') return;
  if(musNext < actx.currentTime - 0.1) musNext = actx.currentTime + 0.05;
  const boss = bossActive();
  const stepDur = boss ? 0.125 : 0.165;
  const tr = boss ? -3 : 0;
  while(musNext < actx.currentTime + 0.25){
    const m = MELODY[musStep % MELODY.length];
    const b = BASSLN[musStep % BASSLN.length];
    if(m){ const o=actx.createOscillator(),g=actx.createGain();
      o.type='square'; o.frequency.value=freq(m+tr);
      g.gain.setValueAtTime(0.10,musNext); g.gain.exponentialRampToValueAtTime(0.001,musNext+stepDur*0.95);
      o.connect(g); g.connect(musGain); o.start(musNext); o.stop(musNext+stepDur); }
    if(b){ const o=actx.createOscillator(),g=actx.createGain();
      o.type='triangle'; o.frequency.value=freq(b+tr);
      g.gain.setValueAtTime(0.16,musNext); g.gain.exponentialRampToValueAtTime(0.001,musNext+stepDur*1.8);
      o.connect(g); g.connect(musGain); o.start(musNext); o.stop(musNext+stepDur*2); }
    musNext += stepDur; musStep++;
  }
}

// ===================== SPRITES =====================
function sprite(rows, pal){
  const w = Math.max(...rows.map(r=>r.length)), h = rows.length;
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const g = c.getContext('2d');
  for(let y=0;y<h;y++) for(let x=0;x<rows[y].length;x++){
    const col = pal[rows[y][x]];
    if(col){ g.fillStyle = col; g.fillRect(x,y,1,1); }
  }
  return c;
}

let treeImg = (()=>{
  const c = document.createElement('canvas'); c.width = 16; c.height = 32;
  const g = c.getContext('2d');
  g.fillStyle = '#4a2f1b'; g.fillRect(5,19,6,13);
  g.fillStyle = '#6b3f24'; g.fillRect(6,19,3,13);
  g.fillStyle = '#4a2f1b'; g.fillRect(4,30,8,2);
  const inBlob = (x,y,grow)=>Math.hypot(x-8,(y-10)*1.06)<7.4+grow
    || Math.hypot(x-4.6,y-14)<5+grow || Math.hypot(x-11.4,y-14)<5+grow;
  for(let y=0;y<24;y++) for(let x=0;x<16;x++)
    if(inBlob(x,y,0.9)){ g.fillStyle='#1e4c22'; g.fillRect(x,y,1,1); }
  for(let y=0;y<24;y++) for(let x=0;x<16;x++){
    if(!inBlob(x,y,0)) continue;
    let col = '#2f7a33';
    if(Math.hypot(x-5.5,y-8)<4.2) col = '#3f9440';
    else if(y>16) col = '#26612a';
    g.fillStyle = col; g.fillRect(x,y,1,1);
  }
  g.fillStyle = '#4fa84f';
  [[4,5],[9,3],[12,9],[7,12],[3,11]].forEach(([x,y])=>g.fillRect(x,y,1,1));
  return c;
})();

function drawShop(s, ox, oy){
  const sx = s.x-ox, sy = s.y-oy;
  shadow(sx, sy, 11);
  dspr(pedImg, sx, sy+2, 2);
  const bob = Math.sin(time*3+s.x)*2;
  dspr(ICONS[s.kind], sx, sy-20+bob, 2);
  const it = SHOPITEMS[s.kind];
  ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
  ctx.fillStyle = '#231a30'; ctx.fillText(it.price, sx+1, sy+15);
  ctx.fillStyle = coins>=it.price ? '#f0c33c' : '#ff8a8a';
  ctx.fillText(it.price, sx, sy+14);
}
function buyItem(p, s){
  const it = SHOPITEMS[s.kind];
  p.cdA = 0.35;
  if(coins < it.price){ ftext(p.x, p.y-34, 'Behöver '+it.price+' mynt!', '#ff8a8a'); sfx('hit'); return; }
  coins -= it.price;
  sfx('revive');
  burst(s.x, s.y-16, '#f0c33c', 14, 110);
  if(s.kind==='heart'){ p.up.hp++; p.maxhp = p.cls.hp + p.up.hp*2; p.hp = p.maxhp; ftext(p.x, p.y-34, '+1 HJÄRTA!', '#ff8a8a'); }
  else if(s.kind==='dmg'){ p.up.dmg++; ftext(p.x, p.y-34, 'Vapen +1!', '#c8d2e0'); }
  else if(s.kind==='spd'){ p.up.spd++; ftext(p.x, p.y-34, 'Snabbare!', '#8fe89a'); }
  else if(s.kind==='cdr'){ p.up.cdr++; ftext(p.x, p.y-34, 'Special laddar fortare!', '#f0c33c'); }
  else if(s.kind==='potion'){
    players.forEach(q=>{ q.downed = false; q.hp = q.maxhp; });
    ftext(p.x, p.y-34, 'Hela laget helat!', '#8fe89a');
  }
}
function pSpd(p){ return p.cls.spd * (1 + 0.12*p.up.spd); }
function pCd(p){ return p.cls.spcCd * Math.pow(0.8, p.up.cdr); }
function dspr(img,cx,feetY,sc,flip,alpha){
  sc = sc||2;
  ctx.save();
  if(alpha!==undefined) ctx.globalAlpha = alpha;
  ctx.translate(Math.round(cx), Math.round(feetY));
  if(flip) ctx.scale(-sc,sc); else ctx.scale(sc,sc);
  ctx.drawImage(img, -img.width/2, -img.height);
  ctx.restore();
}
function shadow(x,y,w){
  ctx.fillStyle = 'rgba(10,8,20,0.16)';
  ctx.beginPath(); ctx.ellipse(x+1, y+2, w*1.3, w*0.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(10,8,20,0.24)';
  ctx.beginPath(); ctx.ellipse(x+1, y+2, w*0.85, w*0.34, 0, 0, Math.PI*2); ctx.fill();
}

  for(let i=0;i<n;i++){ g.fillStyle = cols[(rng()*cols.length)|0]; g.fillRect((rng()*16)|0,(rng()*16)|0,1,1); }
}

const edgeImgs = { grass: [], foam: [] };
function buildEdges(grassTile){
  const mk = fn=>{ const c=document.createElement('canvas'); c.width=16; c.height=16; const g=c.getContext('2d'); fn(g); return c; };
  const rots = [0, Math.PI/2, Math.PI, -Math.PI/2]; // N, Ö, S, V
  edgeImgs.grass = rots.map(r=>mk(g=>{
    g.save(); g.translate(8,8); g.rotate(r); g.translate(-8,-8);
    g.drawImage(grassTile, 0, 0);
    for(let x=0;x<16;x++){ const h = 2+((x*7)%3); g.clearRect(x, h, 1, 16-h); }
    g.restore();
  }));
  edgeImgs.foam = rots.map(r=>mk(g=>{
    g.save(); g.translate(8,8); g.rotate(r); g.translate(-8,-8);
    g.fillStyle='rgba(235,245,255,0.9)';
    for(let x=0;x<16;x++) g.fillRect(x, 0, 1, 1+((x*3)%2));
    g.fillStyle='rgba(170,205,245,0.7)';
    for(let x=0;x<16;x+=2) g.fillRect(x, 1+((x*3)%2), 1, 1);
    g.restore();
  }));
}
buildEdges(tileImgs[T.GRASS][0]);
function sheetTile(img, tx, ty, w, h){
  const c = document.createElement('canvas'); c.width = w||16; c.height = h||16;
  c.getContext('2d').drawImage(img, tx*16, ty*16, c.width, c.height, 0, 0, c.width, c.height);
  return c;
}
let sheetsLoaded = 0;
const owSheet = new Image(), caveSheet = new Image();
function applySheets(){
  const S = (tx,ty)=>sheetTile(owSheet, tx, ty);
  const C2 = (tx,ty)=>sheetTile(caveSheet, tx, ty);
  const over = (base, decal)=>{ const c=sheetTile(owSheet,0,0); const g=c.getContext('2d'); g.clearRect(0,0,16,16); g.drawImage(base,0,0); g.drawImage(decal,0,0); return c; };
  // overworld — släta ljusgräs-tiles (blocket vid 2,16 är sömlöst)
  tileImgs[T.GRASS] = [S(2,16), S(3,16), S(4,16)];
  tileImgs[T.FLOWER] = [over(S(2,16), S(0,8))];
  tileImgs[T.WATER] = [S(4,3), S(4,4)];
  tileImgs[T.PATH] = [S(13,15), S(14,15), S(13,16), S(14,16)];
  // slät sand komponerad av de rena hörnen från pöl-blocket
  const sandC = document.createElement('canvas'); sandC.width=16; sandC.height=16;
  { const g = sandC.getContext('2d');
    g.drawImage(owSheet, 15*16, 6*16, 8, 8, 0, 0, 8, 8);
    g.drawImage(owSheet, 17*16+8, 6*16, 8, 8, 8, 0, 8, 8);
    g.drawImage(owSheet, 15*16, 8*16+8, 8, 8, 0, 8, 8, 8);
    g.drawImage(owSheet, 17*16+8, 8*16+8, 8, 8, 8, 8, 8, 8); }
  tileImgs[T.SAND] = [sandC];
  tileImgs[T.ROCK] = [S(4,16)]; // gräsklädd platå — bergen blir gröna högplatåer som i ALttP
  tileImgs.rockFace = S(5,13);
  tileImgs.rockLip = S(5,11);
  tileImgs[T.DOOR] = [S(7,12)];
  // grotta
  tileImgs[T.DFLOOR] = [C2(7,3)];
  tileImgs[T.DWALL] = [C2(2,1)];
  tileImgs.wallFace = C2(2,4);
  { const c = document.createElement('canvas'); c.width=16; c.height=16;
    const g = c.getContext('2d');
    g.drawImage(tileImgs.wallFace, 0, 0);
    g.drawImage(caveSheet, 0, 6*16, 16, 16, 0, 0, 16, 16);
    tileImgs[T.TORCH] = [c]; }
  { const c = document.createElement('canvas'); c.width=16; c.height=16;
    const g = c.getContext('2d');
    g.drawImage(tileImgs[T.GRASS][0], 0, 0);
    tileImgs.signShape(g);
    tileImgs[T.SIGN] = [c]; }
  { const c = document.createElement('canvas'); c.width=16; c.height=16;
    const g = c.getContext('2d');
    g.drawImage(tileImgs[T.DFLOOR][0], 0, 0);
    tileImgs.gateShape(g);
    tileImgs[T.GATE] = [c]; }
  // trädet: arkets stora lummiga krona (40x32 vid x80,y256) + ritad stam
  treeImg = (()=>{
    const c = document.createElement('canvas'); c.width = 40; c.height = 48;
    const g = c.getContext('2d');
    g.fillStyle = '#3a2415'; g.fillRect(15, 30, 10, 17);
    g.fillStyle = '#6b3f24'; g.fillRect(16, 30, 8, 17);
    g.fillStyle = '#8a5530'; g.fillRect(18, 30, 3, 16);
    g.fillStyle = '#4a2c18'; g.fillRect(22, 32, 1, 14);
    g.fillStyle = '#3a2415'; g.fillRect(13, 45, 14, 3);
    g.drawImage(owSheet, 80, 256, 40, 32, 0, 0, 40, 32);
    return c;
  })();
  treeImg.tscale = 1.5;
  buildEdges(tileImgs[T.GRASS][0]);
}
if(SHEET_OW_B64.length > 100){
  owSheet.onload = caveSheet.onload = ()=>{ if(++sheetsLoaded===2) applySheets(); };
  owSheet.src = SHEET_OW_B64;
  caveSheet.src = SHEET_CAVE_B64;
}

const HERO = { ready:false, cls:{} };
const OBJ = {};
const ENS = {};
// radoffset per riktning [ner, upp, vänster, höger] — kalibrerade mot arket
let WALK_ROWS = [0, 64, 96, 32];
let ATK_ROWS  = [192, 160, 224, 128];
let LOG_ROWS  = [0, 64, 96, 32];
function heroDir(p){ return Math.abs(p.fx) > Math.abs(p.fy) ? (p.fx>0?3:2) : (p.fy<0?1:0); }
function tintSheet(img, target){
  const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
  const g = c.getContext('2d');
  g.drawImage(img, 0, 0);
  const id = g.getImageData(0, 0, c.width, c.height), d = id.data;
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]===0) continue;
    const r=d[i], gg=d[i+1], b=d[i+2];
    // tunikans röda: starkt r, svagt g/b (håret/huden har högre g-andel)
    if(r>90 && gg < r*0.52 && b < r*0.52){
      const lum = Math.min(1.25, r/190);
      d[i]   = Math.min(255, target[0]*lum);
      d[i+1] = Math.min(255, target[1]*lum);
      d[i+2] = Math.min(255, target[2]*lum);
    }
  }
  g.putImageData(id, 0, 0);
  return c;
}
function frameOf(src, x, y, w, h){
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').drawImage(src, x, y, w, h, 0, 0, w, h);
  return c;
}
const charSheet = new Image(), objSheet = new Image(), logSheet = new Image();
let actorsLoaded = 0;
function applyActorSheets(){
  const TINTS = {
    knight:[70,110,220], wizard:[140,80,220], hunter:[60,160,70],
    rogue:[85,85,105], healer:[235,230,215]
  };
  for(const cls of CLASSES){
    const sheet = tintSheet(charSheet, TINTS[cls.id]);
    const walk = WALK_ROWS.map(row=>[0,1,2,3].map(i=>frameOf(sheet, i*16, row, 16, 32)));
    const attack = ATK_ROWS.map(row=>[0,1,2,3].map(i=>frameOf(sheet, i*32, row, 32, 32)));
    HERO.cls[cls.id] = { walk, attack };
    cls.img = walk[0][0];
    cls.icon = frameOf(walk[0][0], 0, 4, 16, 16);
  }
  // föremål & effekter
  OBJ.heartFull = frameOf(objSheet, 4*16, 8*16, 16, 16);
  OBJ.heartHalf = frameOf(objSheet, 6*16, 8*16, 16, 16);
  { const c = frameOf(objSheet, 4*16, 8*16, 16, 16);
    const g = c.getContext('2d'); const id = g.getImageData(0,0,16,16), d = id.data;
    for(let i=0;i<d.length;i+=4){ const m=(d[i]+d[i+1]+d[i+2])/3; d[i]=m*0.5; d[i+1]=m*0.45; d[i+2]=m*0.5; }
    g.putImageData(id,0,0); OBJ.heartEmpty = c; }
  OBJ.heartBig = frameOf(objSheet, 4*16, 0, 16, 16);
  OBJ.coins = [0,1,2,3].map(i=>frameOf(objSheet, i*16, 4*16, 16, 16));
  OBJ.flames = [0,1,2,3,4,5].map(i=>frameOf(objSheet, (4+i)*16, 3*16, 16, 16));
  OBJ.sparks = [0,1,2,3].map(i=>frameOf(objSheet, (10+i)*16, 3*16, 16, 16));
  // fiender — frames är 32 px breda (uppmätt via alfakanalen)
  ENS.flower = [0,1,2,3,4,5,6,7].map(i=>frameOf(objSheet, i*32, 160, 32, 32));
  ENS.ball = [0,1,2].map(i=>frameOf(objSheet, 128+i*32, 192, 32, 32));
  ENS.log = LOG_ROWS.map(row=>[0,1,2,3].map(i=>frameOf(logSheet, i*32, row, 32, 32)));
  OBJ.bush = frameOf(objSheet, 80, 32, 16, 16);
  HERO.ready = true;
}
if(SHEET_CHAR_B64.length > 100){
  charSheet.onload = objSheet.onload = logSheet.onload = ()=>{ if(++actorsLoaded===3) applyActorSheets(); };
  charSheet.src = SHEET_CHAR_B64;
  objSheet.src = SHEET_OBJ_B64;
  logSheet.src = SHEET_LOG_B64;
}

let worlds = null, cur = 'ow';
const CW = ()=>worlds[cur];
function tileAt(w, tx, ty){
  if(tx<0||ty<0||tx>=w.mw||ty>=w.mh) return w.name==='ow' ? T.ROCK : T.DWALL;
  return w.t[ty*w.mw+tx];
}
function setTile(w, tx, ty, v){ if(tx>=0&&ty>=0&&tx<w.mw&&ty<w.mh) w.t[ty*w.mw+tx]=v; }
function solidPx(w, px, py){ return SOLID.has(tileAt(w, Math.floor(px/TS), Math.floor(py/TS))); }
function boxFree(w, x, y, r){
  return !solidPx(w,x-r,y-r) && !solidPx(w,x+r,y-r) && !solidPx(w,x-r,y+r) && !solidPx(w,x+r,y+r);
}
function moveBox(w, e, dx, dy){
  if(dx!==0 && boxFree(w, e.x+dx, e.y, e.r)) e.x += dx;
  if(dy!==0 && boxFree(w, e.x, e.y+dy, e.r)) e.y += dy;
}
function spawnEnemy(w, type, tx, ty){
  const E = {
    slime:{hp:4,dmg:1,r:10,spd:1},
    bat:{hp:3,dmg:1,r:8,spd:70,fly:true},
    skel:{hp:6,dmg:1,r:10,spd:42},
    bslime:{hp:9,dmg:2,r:11,spd:1},
    mini:{hp:2,dmg:1,r:7,spd:1}
  }[type];
  w.enemies.push({type, x:(tx+0.5)*TS, y:(ty+0.5)*TS, hp:E.hp, maxhp:E.hp, dmg:E.dmg, r:E.r, spd:E.spd,
    fly:!!E.fly, vx:0, vy:0, st:'idle', t:Math.random()*1.2, fx:0, fy:1, frozenT:0, flashT:0, shootT:1+Math.random()*2});
}
function buildMini(w){
  const c = document.createElement('canvas'); c.width = w.mw; c.height = w.mh;
  const g = c.getContext('2d');
  const cols = {
    [T.GRASS]:'#4f8c30',[T.TREE]:'#2b5a24',[T.WATER]:'#3b73d8',[T.PATH]:'#c9a05a',
    [T.SAND]:'#dcc07c',[T.ROCK]:'#8a6a4e',[T.FLOWER]:'#4f8c30',[T.DFLOOR]:'#4c4660',
    [T.DWALL]:'#211d33',[T.DOOR]:'#f0c33c',[T.TORCH]:'#211d33',[T.SIGN]:'#8a5e2c',
    [T.GATE]:'#c8ccd8',[T.EXIT]:'#f0c33c',[T.BUSH]:'#3f7d2a'
  };
  for(let y=0;y<w.mh;y++) for(let x=0;x<w.mw;x++){
    g.fillStyle = cols[w.t[y*w.mw+x]] || '#000';
    g.fillRect(x,y,1,1);
  }
  w.mini = c;
}
function genOverworld(){
  const mw=128, mh=96, t = new Uint8Array(mw*mh);
  const rng = mulberry32(1337);
  const w = {mw, mh, t, enemies:[], pickups:[], signs:[], doors:[], shops:[], merchants:[], name:'ow', dark:false};
  const set=(x,y,v)=>{ if(x>=0&&y>=0&&x<mw&&y<mh) t[y*mw+x]=v; };
  const get=(x,y)=>t[y*mw+x];
  // kanter + norra bergsbandet + mittryggen (med pass)
  for(let y=0;y<mh;y++) for(let x=0;x<mw;x++){
    if(y<10) t[y*mw+x]=T.ROCK;
    else if(x<2||x>=mw-2||y>=mh-2) t[y*mw+x]=T.TREE;
    else if(y>=42&&y<=45 && !(x>=60&&x<=66) && !(x>=96&&x<=102)) t[y*mw+x]=T.ROCK;
  }
  // stora sjön i sydost
  for(let y=10;y<mh;y++) for(let x=2;x<mw;x++){
    const dx=(x-100)/13.5, dy=(y-72)/8.5;
    if(dx*dx+dy*dy<1 && get(x,y)===T.GRASS) set(x,y,T.WATER);
  }
  for(let y=11;y<mh-1;y++) for(let x=3;x<mw-3;x++){
    if(get(x,y)!==T.GRASS) continue;

  }

  for(let y=38;y<=41;y++) for(let x=60;x<=68;x++) if(get(x,y)===T.GRASS||get(x,y)===T.TREE) set(x,y,T.PATH);
  for(let y=10;y<=11;y++){ for(let x=63;x<=65;x++) set(x,y,T.PATH); for(let x=107;x<=109;x++) set(x,y,T.PATH); }
  for(let y=46;y<=47;y++) for(let x=29;x<=31;x++) set(x,y,T.PATH);
  // grottdörrar
  set(64,9,T.DOOR);  w.doors.push({tx:64,ty:9,to:'du',dx:20.5*TS,dy:31.5*TS});
  set(108,9,T.DOOR); w.doors.push({tx:108,ty:9,to:'crys',dx:13.5*TS,dy:17.5*TS});
  set(30,45,T.DOOR); w.doors.push({tx:30,ty:45,to:'bat',dx:13.5*TS,dy:17.5*TS});
  // träd (tät skog i väst) + blommor
  for(let y=11;y<mh-2;y++) for(let x=2;x<mw-2;x++){
    if(get(x,y)!==T.GRASS) continue;
    if(dist(x,y,64,85)<8) continue;

    if(r<dense) set(x,y,T.TREE);

  }
  // klippbart högt gräs i dungar
  for(let i=0;i<80;i++){
    const gx = 4+((rng()*(mw-8))|0), gy = 12+((rng()*(mh-16))|0);
    for(let k=0;k<6;k++){

      if(x>1 && y>10 && x<mw-2 && y<mh-2 && get(x,y)===T.GRASS && dist(x,y,64,85)>6) set(x,y,T.BUSH);
    }
  }
  // butik 1 (vid spawn): dryck, hjärta, stövlar
  w.merchants.push({x:70.5*TS, y:82.2*TS});
  [['potion',68.5],['heart',70.5],['spd',72.5]].forEach(([kind,tx])=>{
    w.shops.push({x:tx*TS, y:83.6*TS, kind});
  });
  // butik 2 (norr om passet): vapen, amulett, hjärta
  w.merchants.push({x:64*TS, y:38.4*TS});
  [['dmg',62],['cdr',64],['heart',66]].forEach(([kind,tx])=>{
    w.shops.push({x:tx*TS, y:39.8*TS, kind});

  // skyltar
  const sign=(x,y,txt)=>{ set(x,y,T.SIGN); w.signs.push({tx:x,ty:y,txt}); };

  // fiender per region
  const place = (type,n,xmin,xmax,ymin,ymax)=>{

  place('bslime',8,4,30,54,88);

function genCave(key, opts){
  const mw=26, mh=22, t = new Uint8Array(mw*mh).fill(T.DWALL);
  const w = {mw, mh, t, enemies:[], pickups:[], signs:[], doors:[], shops:[], merchants:[], name:key, dark:true};

  carve(11,14,15,19);
  carve(12,8,14,14);
  carve(4,2,21,8);
  [[6,1],[13,1],[19,1],[3,4],[22,4],[11,13],[15,13]].forEach(([x,y])=>{
    if(t[y*mw+x]===T.DWALL) t[y*mw+x]=T.TORCH;
  });
  t[19*mw+13] = T.EXIT;
  w.doors.push({tx:13,ty:19,to:'ow',dx:opts.retX,dy:opts.retY});
  opts.enemies.forEach(([type,x,y])=>spawnEnemy(w,type,x,y));
  opts.coins.forEach(([x,y])=>w.pickups.push({kind:'coin',x:(x+0.5)*TS,y:(y+0.5)*TS,vx:0,vy:0,t:1}));
  (opts.hearts||[]).forEach(([x,y])=>w.pickups.push({kind:'heart',x:(x+0.5)*TS,y:(y+0.5)*TS,vx:0,vy:0,t:0}));
  (opts.shops||[]).forEach(([kind,x,y])=>w.shops.push({kind, x:(x+0.5)*TS, y:(y+0.5)*TS}));
  buildMini(w);
  return w;

function genDungeon(nPlayers){

  for(let x=18;x<=22;x++) w.gateTiles.push([x,9]);

  t[33*mw+20] = T.EXIT;
  w.doors.push({tx:20,ty:33,to:'ow',dx:64.5*TS,dy:10.5*TS});

  spawnEnemy(w,'slime',17,30); spawnEnemy(w,'slime',23,30);
  spawnEnemy(w,'bslime',20,24);
  spawnEnemy(w,'bslime',13,15); spawnEnemy(w,'bslime',27,15); spawnEnemy(w,'bslime',20,18);
  spawnEnemy(w,'bat',12,19); spawnEnemy(w,'bat',28,19); spawnEnemy(w,'bat',20,14);
  spawnEnemy(w,'skel',11,14); spawnEnemy(w,'skel',29,14); spawnEnemy(w,'skel',20,20);
  w.pickups.push({kind:'heart',x:16.5*TS,y:14.5*TS,vx:0,vy:0,t:0});
  w.pickups.push({kind:'heart',x:24.5*TS,y:14.5*TS,vx:0,vy:0,t:0});
  // BOSSEN
  const bhp = 110 + 55*(nPlayers-1);

// ===================== EFFEKTER =====================
function burst(x,y,col,n,spd){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s=(0.3+Math.random()*0.7)*(spd||90);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,ttl:0.4+Math.random()*0.3,max:0.7,col,sz:2+Math.random()*2});
  }
}
function ftext(x,y,txt,col){ texts.push({x,y,txt,col,ttl:0.9}); }

// klippbart högt gräs — hugg bort det och hitta ibland mynt/hjärtan
function cutGrass(w, px, py, r){
  const tx0 = Math.floor((px-r)/TS), tx1 = Math.floor((px+r)/TS);
  const ty0 = Math.floor((py-r)/TS), ty1 = Math.floor((py+r)/TS);
  let cut = 0;
  for(let ty=ty0; ty<=ty1; ty++) for(let tx=tx0; tx<=tx1; tx++){
    if(tileAt(w,tx,ty)!==T.BUSH) continue;
    if(dist(px,py,(tx+0.5)*TS,(ty+0.5)*TS) > r+12) continue;
    setTile(w, tx, ty, T.GRASS);
    burst((tx+0.5)*TS, (ty+0.5)*TS, '#4fae3f', 8, 90);
    const roll = Math.random();
    if(roll<0.08) w.pickups.push({kind:'coin', x:(tx+0.5)*TS, y:(ty+0.5)*TS, vx:0, vy:0, t:0});
    else if(roll<0.12) w.pickups.push({kind:'heart', x:(tx+0.5)*TS, y:(ty+0.5)*TS, vx:0, vy:0, t:0});
    cut++;
  }
  if(cut) sfx('swing');
}

function damageEnemy(e, dmg, sx, sy, byPlayer){
  if(e.hp<=0) return;
  e.hp -= dmg; e.flashT = 0.12;
  if(byPlayer) byPlayer.stats.dmg += dmg;
  const d = dist(sx,sy,e.x,e.y)||1;
  if(e.type!=='boss'){ e.vx += (e.x-sx)/d*160; e.vy += (e.y-sy)/d*160; }
  ftext(e.x, e.y-24, dmg, '#fff');
  if(HERO.ready) parts.push({x:e.x, y:e.y-12, vx:0, vy:0, ttl:0.28, max:0.28, spark:true});
  sfx('hit');
  if(e.hp<=0){
    sfx('edie');
    burst(e.x, e.y-8, e.type==='bat'?'#5a4a72':(e.type==='skel'?'#e8e8e0':'#6fc84f'), 12, 110);
    if(byPlayer) byPlayer.stats.kills++;
    if(e.type==='boss'){ bossDeath(e); return; }
    const w = CW();
    const nc = e.type==='mini'?1 : e.type==='bslime'?4 : e.type==='skel'?3 : 2;
    for(let i=0;i<nc;i++){
      const a=Math.random()*Math.PI*2;
      w.pickups.push({kind:'coin',x:e.x,y:e.y-6,vx:Math.cos(a)*70,vy:Math.sin(a)*70,t:0});
    }
    if(Math.random()<0.25) w.pickups.push({kind:'heart',x:e.x,y:e.y,vx:0,vy:0,t:0});
  }
}
function damagePlayer(p, dmg, sx, sy){
  if(p.downed || p.invT>0 || p.dashT>0) return;
  p.hp -= dmg; p.invT = 0.85; p.flashT = 0.15;
  const d = dist(sx,sy,p.x,p.y)||1;
  p.kbx += (p.x-sx)/d*180; p.kby += (p.y-sy)/d*180;
  sfx('hurt');
  burst(p.x, p.y-10, '#e04848', 6, 80);
  cam.shake = Math.max(cam.shake, 3);
  if(p.hp<=0){
    p.hp = 0; p.downed = true; p.reviveT = 0; p.stats.downs++;
    ftext(p.x, p.y-30, 'NED!', '#ff6a5e');
  }
}
function bossDeath(b){
  b.dead = true; b.active = false;
  sfx('fanfare');
  burst(b.x, b.y-20, '#5fae4a', 40, 180);
  burst(b.x, b.y-20, '#f0c33c', 30, 140);
  cam.shake = 10;
  const w = worlds.du;
  w.gateTiles.forEach(([x,y])=>setTile(w,x,y,T.DFLOOR));
  w.gateClosed = false;
  w.pickups.push({kind:'crystal', x:b.x, y:b.y, vx:0, vy:0, t:0});
  worlds.du.enemies = worlds.du.enemies.filter(e=>e.type!=='boss' && e.hp>0);
}

// ===================== SPELARE =====================
function heroAttack(p){
  const c = p.cls, ang = Math.atan2(p.fy, p.fx);
  p.cdA = c.atkCd;
  if(c.id==='knight' || c.id==='rogue'){
    p.swingT = p.swingDur = c.id==='knight'?0.2:0.15;
    p.swingAng = ang; p.swingArc = c.id==='knight'?2.4:1.7; p.spin = false;
    sfx('swing');
    const range = c.id==='knight'?42:32, arc = c.id==='knight'?1.15:0.85;
    for(const e of CW().enemies){
      if(e.hp<=0) continue;
      const d = dist(p.x,p.y,e.x,e.y);
      if(d < range+e.r && Math.abs(angDiff(ang, Math.atan2(e.y-p.y,e.x-p.x))) < arc){
        let dmg = c.dmg + p.up.dmg;
        if(c.id==='rogue'){
          const el = Math.hypot(e.fx,e.fy)||1;
          if((p.fx*e.fx+p.fy*e.fy)/el > 0.3){ dmg = 5 + p.up.dmg; ftext(p.x,p.y-34,'SMYG!','#c0e8ff'); }
        }
        damageEnemy(e, dmg, p.x, p.y, p);
      }
    }
    cutGrass(CW(), p.x+p.fx*26, p.y+p.fy*26, 26);
  } else if(c.id==='wizard'){
    sfx('fire');
    p.swingT = p.swingDur = 0.22; p.swingAng = ang; p.spin = false;
    shots.push({x:p.x+p.fx*12, y:p.y-10+p.fy*12, vx:p.fx*240, vy:p.fy*240, dmg:3+p.up.dmg, kind:'fire', from:'p', owner:p, ttl:1.4, r:7});
  } else if(c.id==='hunter'){
    sfx('arrow');
    p.swingT = p.swingDur = 0.18; p.swingAng = ang; p.spin = false;
    shots.push({x:p.x+p.fx*12, y:p.y-10+p.fy*12, vx:p.fx*340, vy:p.fy*340, dmg:2+p.up.dmg, kind:'arrow', from:'p', owner:p, ttl:1.1, r:4});
  } else if(c.id==='healer'){
    sfx('bolt');
    p.swingT = p.swingDur = 0.2; p.swingAng = ang; p.spin = false;
    shots.push({x:p.x+p.fx*12, y:p.y-10+p.fy*12, vx:p.fx*300, vy:p.fy*300, dmg:2+p.up.dmg, kind:'bolt', from:'p', owner:p, ttl:1.0, r:5, healed:new Set()});
  }
}
function heroSpecial(p){
  const c = p.cls;
  p.cdS = pCd(p);
  if(c.id==='knight'){
    sfx('spin');
    p.swingT = p.swingDur = 0.38;
    p.swingAng = Math.atan2(p.fy,p.fx); p.swingArc = Math.PI*2; p.spin = true;
    for(const e of CW().enemies){
      if(e.hp>0 && dist(p.x,p.y,e.x,e.y) < 52+e.r) damageEnemy(e, 5+p.up.dmg, p.x, p.y, p);
    }
    burst(p.x, p.y-8, '#c0ccdc', 14, 130);
    cutGrass(CW(), p.x, p.y, 54);
  } else if(c.id==='wizard'){
    sfx('freeze');
    for(const e of CW().enemies){
      if(e.hp>0 && e.type!=='boss' && dist(p.x,p.y,e.x,e.y) < 110){
        e.frozenT = 2.5; damageEnemy(e, 1, p.x, p.y, p);
      } else if(e.hp>0 && e.type==='boss' && dist(p.x,p.y,e.x,e.y) < 110){
        damageEnemy(e, 2, p.x, p.y, p);
      }
    }
    burst(p.x, p.y-8, '#a8d8f8', 20, 150);
  } else if(c.id==='hunter'){
    sfx('arrow');
    const base = Math.atan2(p.fy, p.fx);
    for(let i=-2;i<=2;i++){
      const a = base + i*0.18;
      shots.push({x:p.x, y:p.y-10, vx:Math.cos(a)*340, vy:Math.sin(a)*340, dmg:2+p.up.dmg, kind:'arrow', from:'p', owner:p, ttl:1.1, r:4});
    }
  } else if(c.id==='rogue'){
    sfx('dash');
    p.dashT = 0.14; p.dashX = p.fx; p.dashY = p.fy; p.dashHit = new Set();
  } else if(c.id==='healer'){
    sfx('heal');
    for(const q of players){
      if(dist(p.x,p.y,q.x,q.y) < 130){
        if(q.downed){ q.downed=false; q.hp=Math.min(q.maxhp,8); q.invT=1.5; sfx('revive'); ftext(q.x,q.y-30,'ÅTERUPPLIVAD!','#f0d898'); p.stats.heal+=8; }
        else { const h = Math.min(4, q.maxhp-q.hp); if(h>0){ q.hp+=h; p.stats.heal+=h; ftext(q.x,q.y-30,'+'+h,'#8fe89a'); } }
        burst(q.x, q.y-12, '#f0e8b0', 10, 70);
      }
    }
  }
}
function updPlayer(p, dt){
  const c = C(p.ctrlId);
  p.cdA = Math.max(0, p.cdA-dt);
  p.cdS = Math.max(0, p.cdS-dt);
  p.invT = Math.max(0, p.invT-dt);
  p.swingT = Math.max(0, p.swingT-dt);
  p.flashT = Math.max(0, p.flashT-dt);
  // knockback
  p.kbx *= Math.pow(0.0001, dt); p.kby *= Math.pow(0.0001, dt);
  if(Math.abs(p.kbx)>2||Math.abs(p.kby)>2) moveBox(CW(), p, p.kbx*dt, p.kby*dt);

  if(p.downed){
    // återupplivning: en levande vän nära
    const near = players.some(q=>q!==p && !q.downed && dist(p.x,p.y,q.x,q.y)<48);
    if(near){ p.reviveT += dt; if(p.reviveT>=3){ p.downed=false; p.hp=6; p.invT=1.5; sfx('revive'); ftext(p.x,p.y-30,'UPPE IGEN!','#8fe89a'); } }
    else p.reviveT = Math.max(0, p.reviveT-dt*0.7);
    return;
  }
  if(p.dashT>0){
    p.dashT -= dt;
    moveBox(CW(), p, p.dashX*600*dt, p.dashY*600*dt);
    for(const e of CW().enemies){
      if(e.hp>0 && !p.dashHit.has(e) && dist(p.x,p.y,e.x,e.y)<e.r+16){
        p.dashHit.add(e); damageEnemy(e, 4+p.up.dmg, p.x-p.dashX*20, p.y-p.dashY*20, p);
      }
    }
    parts.push({x:p.x,y:p.y-10,vx:0,vy:0,ttl:0.25,max:0.25,col:'#8a8aa8',sz:6});
    cutGrass(CW(), p.x, p.y, 20);
    return;
  }
  let dx = c.x, dy = c.y;
  const l = Math.hypot(dx,dy);
  p.moving = l>0;
  if(l>0){
    dx/=l; dy/=l;
    p.fx = dx; p.fy = dy;
    p.walkT += dt*8;
    moveBox(CW(), p, dx*pSpd(p)*dt, dy*pSpd(p)*dt);
    p.dustT -= dt;
    if(p.dustT<=0){
      p.dustT = 0.24;
      parts.push({x:p.x-dx*6, y:p.y-2, vx:-dx*20+(Math.random()-0.5)*14, vy:-8-Math.random()*10, ttl:0.3, max:0.3, col:'#c8b088', sz:2.5});
    }
  }
  // håll ihop gruppen (kamera-koppel) — aldrig in i väggar, aldrig före kamerans första snap
  if(players.length>1 && !camSnap){
    const nx = clamp(p.x, cam.x+20, cam.x+VW-20);
    const ny = clamp(p.y, cam.y+26, cam.y+VH-10);
    if((nx!==p.x || ny!==p.y) && boxFree(CW(), nx, ny, p.r)){ p.x = nx; p.y = ny; }
  }
  // attack auto-repeterar när knappen hålls inne; köp kräver ett nytt tryck
  const nearPed = (CW().shops||[]).filter(s=>dist(p.x,p.y,s.x,s.y)<36)
    .sort((a,b)=>dist(p.x,p.y,a.x,a.y)-dist(p.x,p.y,b.x,b.y))[0];
  if(c.aJP && nearPed) buyItem(p, nearPed);
  else if(c.attack && p.cdA<=0 && !nearPed) heroAttack(p);
  if(c.sJP && p.cdS<=0) heroSpecial(p);

  // dörrar (radie-check så ingen med sidooffset missar öppningen)
  const w = CW();
  for(const d of w.doors){
    if(!trans && dist(p.x, p.y, (d.tx+0.5)*TS, (d.ty+0.5)*TS) < 30){
      trans = {t:0, phase:'out', cb:()=>{
        cur = d.to;
        players.forEach((q,i)=>{ q.x = d.dx+(i%3-1)*24; q.y = d.dy+Math.floor(i/3)*24; q.kbx=0; q.kby=0; });
        shots = []; camSnap = true;
      }};
    }
  }
}

// ===================== FIENDER =====================
function nearestPlayer(x,y){
  let best=null, bd=1e9;
  for(const p of players){ if(p.downed) continue; const d=dist(x,y,p.x,p.y); if(d<bd){bd=d;best=p;} }
  return best ? {p:best, d:bd} : null;
}
function updEnemy(e, dt){
  e.flashT = Math.max(0, e.flashT-dt);
  if(e.frozenT>0){ e.frozenT -= dt; return; }
  const w = CW();
  e.vx *= Math.pow(0.001, dt); e.vy *= Math.pow(0.001, dt);
  if(e.type==='boss'){ updBoss(e, dt); return; }
  const tgt = nearestPlayer(e.x, e.y);

  if(e.type==='slime' || e.type==='bslime' || e.type==='mini'){
    e.t -= dt;
    if(e.t<=0){
      e.t = 0.9 + Math.random()*0.8;
      let a;
      if(tgt && tgt.d<230) a = Math.atan2(tgt.p.y-e.y, tgt.p.x-e.x);
      else a = Math.random()*Math.PI*2;
      const pow = e.type==='bslime'?170 : e.type==='mini'?150 : 140;
      e.vx += Math.cos(a)*pow; e.vy += Math.sin(a)*pow;
      e.fx = Math.cos(a); e.fy = Math.sin(a);
    }
    moveBox(w, e, e.vx*dt, e.vy*dt);
  } else if(e.type==='bat'){
    if(tgt && tgt.d<280){
      const a = Math.atan2(tgt.p.y-e.y, tgt.p.x-e.x) + Math.sin(time*5+e.x)*0.6;
      e.vx = lerp(e.vx, Math.cos(a)*e.spd, dt*2);
      e.vy = lerp(e.vy, Math.sin(a)*e.spd, dt*2);
    } else {
      e.vx = lerp(e.vx, Math.sin(time*1.3+e.y)*30, dt);
      e.vy = lerp(e.vy, Math.cos(time*1.1+e.x)*30, dt);
    }
    e.fx = Math.sign(e.vx)||1; e.fy = 0;
    e.x = clamp(e.x+e.vx*dt, TS, w.mw*TS-TS);
    e.y = clamp(e.y+e.vy*dt, TS, w.mh*TS-TS);
  } else if(e.type==='skel'){
    if(tgt){
      const a = Math.atan2(tgt.p.y-e.y, tgt.p.x-e.x);
      e.fx = Math.cos(a); e.fy = Math.sin(a);
      if(tgt.d>190) moveBox(w, e, Math.cos(a)*e.spd*dt, Math.sin(a)*e.spd*dt);
      else if(tgt.d<110) moveBox(w, e, -Math.cos(a)*e.spd*dt, -Math.sin(a)*e.spd*dt);
      e.shootT -= dt;
      if(e.shootT<=0 && tgt.d<300){
        e.shootT = 2.2;
        sfx('shoot2');
        shots.push({x:e.x, y:e.y-12, vx:Math.cos(a)*190, vy:Math.sin(a)*190, dmg:1, kind:'earrow', from:'e', ttl:2, r:4});
      }
    }
    if(e.vx||e.vy) moveBox(w, e, e.vx*dt, e.vy*dt);
  }
  // kontaktskada
  if(tgt && tgt.d < e.r+11) damagePlayer(tgt.p, e.dmg, e.x, e.y);
}
function updBoss(b, dt){
  const w = worlds.du;
  if(b.dead) return;
  if(!b.active){
    // aggro när någon kliver in i bossrummet
    if(cur==='du' && players.some(p=>!p.downed && p.y < 9.5*TS)){
      b.active = true; b.st='rest'; b.t=1.2;
      sfx('roar'); cam.shake = 8;
      w.gateTiles.forEach(([x,y])=>setTile(w,x,y,T.GATE));
      // knuffa in spelare som står i grindraden så ingen fastnar i gallret
      for(const p of players){
        const ptx = Math.floor(p.x/TS), pty = Math.floor(p.y/TS);
        if(pty===9 && ptx>=18 && ptx<=22) p.y = 8*TS+12;
      }
      w.gateClosed = true;
      sfx('lock');
      toast('SLEMKUNGEN VAKNAR!');
    }
    return;
  }
  const ph2 = b.hp < b.maxhp*0.5;
  b.t -= dt;
  if(b.st==='rest'){
    if(b.t<=0){
      const r = Math.random();
      if(r<0.45){ b.st='hop'; b.hopN = ph2?4:3; b.t=0; }
      else if(r<0.75){ b.st='ring'; b.t=0.4; }
      else { b.st='spawn'; b.t=0.5; }
    }
  } else if(b.st==='hop'){
    if(b.t<=0){
      if(b.hopN<=0){ b.st='rest'; b.t=ph2?0.5:1.0; }
      else {
        b.hopN--;
        const alive = players.filter(p=>!p.downed);
        const tp = alive.length ? alive[(Math.random()*alive.length)|0] : null;
        if(tp){
          const a = Math.atan2(tp.y-b.y, tp.x-b.x);
          b.vx = Math.cos(a)*(ph2?300:240); b.vy = Math.sin(a)*(ph2?300:240);
        }
        b.t = 0.7;
        b.jumpT = 0.35;
      }
    }
    moveBox(w, b, b.vx*dt, b.vy*dt);
    b.vx *= Math.pow(0.01, dt); b.vy *= Math.pow(0.01, dt);
    if(b.jumpT!==undefined){
      b.jumpT -= dt;
      if(b.jumpT<=0 && ph2){
        b.jumpT = undefined;
        cam.shake = 6; sfx('hit');
        for(let i=0;i<8;i++){
          const a = i/8*Math.PI*2;
          shots.push({x:b.x, y:b.y-8, vx:Math.cos(a)*130, vy:Math.sin(a)*130, dmg:1, kind:'slimeb', from:'e', ttl:2.5, r:6});
        }
      }
    }
  } else if(b.st==='ring'){
    if(b.t<=0){
      const n = ph2?14:10;
      sfx('fire');
      for(let i=0;i<n;i++){
        const a = i/n*Math.PI*2 + Math.random()*0.2;
        shots.push({x:b.x, y:b.y-8, vx:Math.cos(a)*140, vy:Math.sin(a)*140, dmg:1, kind:'slimeb', from:'e', ttl:3, r:6});
      }
      b.st='rest'; b.t=ph2?0.7:1.2;
    }
  } else if(b.st==='spawn'){
    if(b.t<=0){
      const minis = w.enemies.filter(e=>e.type==='mini'&&e.hp>0).length;
      const n = Math.min(3, 6-minis);
      for(let i=0;i<n;i++){
        spawnEnemy(w,'mini',Math.floor(b.x/TS)+(i-1), Math.floor(b.y/TS)+1);
        burst(b.x+(i-1)*TS, b.y+TS, '#6fc84f', 8, 90);
      }
      b.st='rest'; b.t=1.2;
    }
  }
  const tgt = nearestPlayer(b.x, b.y);
  if(tgt && tgt.d < b.r+12) damagePlayer(tgt.p, b.dmg, b.x, b.y);
}

// ===================== SKOTT & PLOCK =====================
function updShots(dt){
  const w = CW();
  for(const s of shots){
    s.ttl -= dt;
    s.x += s.vx*dt; s.y += s.vy*dt;
    if(s.ttl<=0){ s.dead=true; if(s.kind==='fire') explode(s); continue; }
    if(!s.fly && solidPx(w, s.x, s.y)){ s.dead=true; if(s.kind==='fire') explode(s); else burst(s.x,s.y,'#aaa',4,60); continue; }
    if(s.from==='p'){
      if(s.kind==='bolt'){
        for(const q of players){
          if(q!==s.owner && !s.healed.has(q) && dist(s.x,s.y,q.x,q.y-10)<16){
            s.healed.add(q);
            if(q.hp<q.maxhp && !q.downed){ q.hp=Math.min(q.maxhp,q.hp+1); s.owner.stats.heal++; ftext(q.x,q.y-30,'+1','#8fe89a'); sfx('heal'); }
          }
        }
      }
      for(const e of w.enemies){
        if(e.hp>0 && dist(s.x,s.y,e.x,e.y-8)<e.r+s.r){
          s.dead = true;
          if(s.kind==='fire') explode(s, e);
          else damageEnemy(e, s.dmg, s.x-s.vx*0.01, s.y-s.vy*0.01, s.owner);
          break;
        }
      }
    } else {
      for(const p of players){
        if(!p.downed && dist(s.x,s.y,p.x,p.y-10)<12+s.r){
          s.dead = true;
          damagePlayer(p, s.dmg, s.x-s.vx*0.01, s.y-s.vy*0.01);
          break;
        }
      }
    }
  }
  shots = shots.filter(s=>!s.dead);
}
function explode(s, hitE){
  sfx('fire');
  burst(s.x, s.y, '#ff9c3f', 16, 140);
  burst(s.x, s.y, '#ffd24f', 10, 100);
  cam.shake = Math.max(cam.shake, 2);
  cutGrass(CW(), s.x, s.y, 46);
  for(const e of CW().enemies){
    if(e.hp<=0) continue;
    const d = dist(s.x,s.y,e.x,e.y);
    if(e===hitE) damageEnemy(e, s.dmg, s.x, s.y, s.owner);
    else if(d<46) damageEnemy(e, 2, s.x, s.y, s.owner);
  }
}
function updPickups(dt){
  const w = CW();
  for(const pk of w.pickups){
    pk.t += dt;
    pk.vx *= Math.pow(0.01, dt); pk.vy *= Math.pow(0.01, dt);
    pk.x += pk.vx*dt; pk.y += pk.vy*dt;
    // magnet
    const tgt = nearestPlayer(pk.x, pk.y);
    if(tgt && pk.kind==='coin' && tgt.d<56 && pk.t>0.3){
      pk.x = lerp(pk.x, tgt.p.x, dt*8); pk.y = lerp(pk.y, tgt.p.y, dt*8);
    }
    if(tgt && tgt.d<16 && pk.t>0.25){
      if(pk.kind==='coin'){ coins++; sfx('coin'); pk.dead=true; }
      else if(pk.kind==='heart'){
        if(tgt.p.hp<tgt.p.maxhp){ tgt.p.hp=Math.min(tgt.p.maxhp,tgt.p.hp+4); sfx('heart'); ftext(tgt.p.x,tgt.p.y-30,'+2 ♥','#ff8a8a'); pk.dead=true; }
      }
      else if(pk.kind==='crystal'){ pk.dead=true; state='win'; winT=0; sfx('fanfare'); }
    }
  }
  w.pickups = w.pickups.filter(p=>!p.dead);
}

// ===================== UPPDATERING =====================
function update(dt){
  time += dt;
  pollInputs();
  updMusic();
  pushStatus();
  if(toastT>0) toastT -= dt;

  if(state==='select'){ updSelect(dt); return; }
  if(state==='win' || state==='over'){
    winT += dt; overT += dt;
    for(const pt of parts){ pt.ttl-=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; }
    parts = parts.filter(p=>p.ttl>0);
    const anyA = players.some(p=>C(p.ctrlId).aJP) || C('k0').aJP;
    const anyS = players.some(p=>C(p.ctrlId).sJP);
    if(winT>1.2 && anyA){ if(state==='win'){ joiners=[]; players=[]; state='select'; } else resetRun(); }
    if(winT>1.2 && anyS && state==='win'){ resetRun(); }
    return;
  }
  if(state!=='play') return;
  // paus via handkontroll
  for(const p of players) if(C(p.ctrlId).stJP) paused = !paused;
  if(paused) return;

  if(trans){
    trans.t += dt*2.6;
    if(trans.phase==='out' && trans.t>=1){ trans.cb(); trans.phase='in'; trans.t=0; }
    else if(trans.phase==='in' && trans.t>=1) trans = null;
    if(trans && trans.phase==='out') return;
  }

  // drop-in: nya kontroller kan hoppa in mitt i spelet
  scanForJoiners();
  joiners = joiners.filter(j=> j.ctrlId[0]!=='n' || (NET.ctrls[j.ctrlId] && NET.ctrls[j.ctrlId].alive));
  for(const j of joiners){
    const jc = C(j.ctrlId);
    if(j.fresh){ j.fresh = false; continue; }
    if(jc.lJP){ j.ci = (j.ci+4)%5; sfx('bolt'); }
    if(jc.rJP){ j.ci = (j.ci+1)%5; sfx('bolt'); }
    if(jc.aJP) j.spawn = true;
    if(jc.sJP) j.remove = true;
  }
  joiners.filter(j=>j.spawn).forEach(dropIn);
  joiners = joiners.filter(j=>!j.spawn && !j.remove);

  for(const p of players) updPlayer(p, dt);

  const w = CW();
  // uppdatera bara fiender i närheten av kameran (stor värld)
  const ccx = cam.x+VW/2, ccy = cam.y+VH/2;
  for(const e of w.enemies)
    if(e.hp>0 && Math.abs(e.x-ccx)<VW*0.8+140 && Math.abs(e.y-ccy)<VH*0.8+140) updEnemy(e, dt);
  w.enemies = w.enemies.filter(e=>e.hp>0 || e.type==='boss');

  updShots(dt);
  updPickups(dt);

  // ambient: pollen/eldflugor som driver genom världen
  if(!w.dark && Math.random()<0.09)
    parts.push({x:cam.x+Math.random()*VW, y:cam.y+Math.random()*VH,
      vx:6+Math.random()*10, vy:-3+Math.random()*7, ttl:2.2, max:2.2, col:'#efe9bf', sz:2});

  for(const pt of parts){ pt.ttl-=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vx*=0.95; pt.vy*=0.95; }
  parts = parts.filter(p=>p.ttl>0);
  for(const t of texts){ t.ttl-=dt; t.y-=30*dt; }
  texts = texts.filter(t=>t.ttl>0);

  // kamera
  let cx=0, cy=0;
  players.forEach(p=>{ cx+=p.x; cy+=p.y; });
  cx/=players.length; cy/=players.length;
  const tx = w.mw*TS<VW ? (w.mw*TS-VW)/2 : clamp(cx-VW/2, 0, w.mw*TS-VW);
  const ty = w.mh*TS<VH ? (w.mh*TS-VH)/2 : clamp(cy-VH/2, 0, w.mh*TS-VH);
  if(camSnap){ cam.x=tx; cam.y=ty; camSnap=false; }
  else { cam.x = lerp(cam.x, tx, dt*5); cam.y = lerp(cam.y, ty, dt*5); }
  cam.shake = Math.max(0, cam.shake - dt*18);

  // game over?
  if(players.length && players.every(p=>p.downed)){
    state='over'; winT=0; overT=0;
  }
}

// ===================== VAL-SKÄRM =====================
function scanForJoiners(){
  const used = new Set([...joiners.map(j=>j.ctrlId), ...players.map(p=>p.ctrlId)]);
  const candidates = ['k0','k1', ...netCtrlIds()];
  if(LOCALPAD) candidates.push('t0');
  const gps = pads();
  for(let i=0;i<gps.length;i++) if(gps[i]) candidates.push('p'+i);
  for(const id of candidates){
    if(used.has(id)) continue;
    if(C(id).aJP && players.length + joiners.length < 5){
      joiners.push({ctrlId:id, ci:joiners.length%5, ready:false, fresh:true});
      sfx('coin');
    }
  }
}
function updSelect(dt){
  scanForJoiners();
  // navigera
  for(const j of joiners){
    const c = C(j.ctrlId);
    if(j.fresh){ j.fresh = false; continue; } // join-trycket får inte också betyda "redo"
    if(!j.ready){
      if(c.lJP){ j.ci=(j.ci+4)%5; sfx('bolt'); }
      if(c.rJP){ j.ci=(j.ci+1)%5; sfx('bolt'); }
      if(c.aJP){ j.ready=true; sfx('heart'); }
      if(c.sJP){ j.remove=true; }
    } else {
      if(c.sJP){ j.ready=false; sfx('hit'); }
    }
  }
  const removed = joiners.filter(j=>j.remove);
  if(removed.length) joiners = joiners.filter(j=>!j.remove);

  if(joiners.length>0 && joiners.every(j=>j.ready)){
    countdown -= dt;
    if(countdown<=0) startGame();
  } else countdown = 3;
}

// ===================== RITNING =====================
function draw(){
  ctx.fillStyle = '#0d0b16';
  ctx.fillRect(0,0,VW,VH);
  qrPanel.style.display = (NET.open && state==='select') ? 'block' : 'none';
  if(state==='select'){ drawSelect(); return; }

  const w = CW();
  const shx = cam.shake ? (Math.random()-0.5)*cam.shake*2 : 0;
  const shy = cam.shake ? (Math.random()-0.5)*cam.shake*2 : 0;
  const ox = Math.round(cam.x+shx), oy = Math.round(cam.y+shy);

  // tiles
  const x0 = Math.floor(ox/TS), y0 = Math.floor(oy/TS);
  const x1 = x0 + Math.ceil(VW/TS)+1, y1 = y0 + Math.ceil(VH/TS)+1;
  const wf = (time*2|0)%2;
  const treesVis = [];
  for(let ty=y0; ty<=y1; ty++){
    for(let tx=x0; tx<=x1; tx++){
      const t = tileAt(w, tx, ty);
      let img;
      if(t===T.GRASS) img = tileImgs[T.GRASS][(tx*7+ty*13)%tileImgs[T.GRASS].length];
      else if(t===T.TREE){ img = tileImgs[T.GRASS][(tx*7+ty*13)%tileImgs[T.GRASS].length]; treesVis.push([tx,ty]); }
      else if(t===T.WATER) img = tileImgs[T.WATER][wf];
      else if(t===T.BUSH) img = tileImgs[T.GRASS][(tx*7+ty*13)%tileImgs[T.GRASS].length];
      else if(t===T.PATH) img = tileImgs[T.PATH][(tx*7+ty*13)%tileImgs[T.PATH].length];
      else if(t===T.ROCK){
        const b1 = tileAt(w,tx,ty+1);
        img = b1!==T.ROCK ? tileImgs.rockFace
            : (tileAt(w,tx,ty+2)!==T.ROCK && tileImgs.rockLip) ? tileImgs.rockLip
            : tileImgs[T.ROCK][0];
      }
      else if(t===T.DWALL){
        const b = tileAt(w,tx,ty+1);
        img = (b===T.DFLOOR||b===T.GATE||b===T.EXIT) ? tileImgs.wallFace : tileImgs[T.DWALL][0];
      }
      else img = (tileImgs[t]||tileImgs[T.GRASS])[0];
      ctx.drawImage(img, tx*TS-ox, ty*TS-oy, TS, TS);
      // mjuka kanter: gräsfransar mot stig/sand, skum runt vatten
      if(t===T.PATH || t===T.SAND){
        for(let d=0;d<4;d++){
          const nb = d===0?tileAt(w,tx,ty-1):d===1?tileAt(w,tx+1,ty):d===2?tileAt(w,tx,ty+1):tileAt(w,tx-1,ty);
          if(nb===T.GRASS||nb===T.FLOWER||nb===T.TREE) ctx.drawImage(edgeImgs.grass[d], tx*TS-ox, ty*TS-oy, TS, TS);
        }
      } else if(t===T.WATER){
        for(let d=0;d<4;d++){
          const nb = d===0?tileAt(w,tx,ty-1):d===1?tileAt(w,tx+1,ty):d===2?tileAt(w,tx,ty+1):tileAt(w,tx-1,ty);
          if(nb!==T.WATER) ctx.drawImage(edgeImgs.foam[d], tx*TS-ox, ty*TS-oy, TS, TS);
        }
      }
      if(t===T.BUSH){
        if(HERO.ready) ctx.drawImage(OBJ.bush, tx*TS-ox, ty*TS-oy, TS, TS);
        else {
          ctx.fillStyle = '#3f8f3f';
          ctx.fillRect(tx*TS-ox+8, ty*TS-oy+12, 4, 14);
          ctx.fillRect(tx*TS-ox+16, ty*TS-oy+8, 4, 18);
          ctx.fillRect(tx*TS-ox+22, ty*TS-oy+14, 4, 12);
        }
      }
      if(t===T.TORCH){
        if(HERO.ready){
          ctx.drawImage(OBJ.flames[Math.floor(time*10+tx*3)%6], tx*TS-ox, ty*TS-oy-8, TS, TS);
        } else {
          const fl = 3+Math.sin(time*13+tx*7)*1.5;
          ctx.fillStyle = 'rgba(255,170,60,0.9)';
          ctx.beginPath(); ctx.arc(tx*TS-ox+16, ty*TS-oy+13, fl, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = 'rgba(255,230,120,0.9)';
          ctx.beginPath(); ctx.arc(tx*TS-ox+16, ty*TS-oy+14, fl*0.5, 0, Math.PI*2); ctx.fill();
        }
      }
    }
  }
  // trädskuggor på marken (solen står i nordväst)
  const trw = treeImg.tscale ? 21 : 17;
  for(const [ttx,tty] of treesVis){
    ctx.fillStyle = 'rgba(10,8,20,0.2)';
    ctx.beginPath();
    ctx.ellipse(ttx*TS+16-ox+4, (tty+1)*TS-oy-5, trw, trw*0.34, 0, 0, Math.PI*2);
    ctx.fill();
  }
  // plock
  for(const pk of w.pickups){
    const bob = Math.sin(time*4+pk.x)*2;
    if(pk.kind==='coin'){
      if(HERO.ready) ctx.drawImage(OBJ.coins[Math.floor(time*8+pk.x/9)%4], pk.x-ox-10, pk.y-oy-16+bob, 20, 20);
      else dspr(SPR.coin, pk.x-ox, pk.y-oy+bob, 2);
    }
    else if(pk.kind==='heart'){
      if(HERO.ready) ctx.drawImage(OBJ.heartBig, pk.x-ox-12, pk.y-oy-20+bob, 24, 24);
      else dspr(SPR.heart, pk.x-ox, pk.y-oy+bob, 2);
    }
    else if(pk.kind==='crystal'){
      ctx.fillStyle = 'rgba(240,195,60,'+(0.25+0.15*Math.sin(time*3))+')';
      ctx.beginPath(); ctx.arc(pk.x-ox, pk.y-oy-10, 26, 0, Math.PI*2); ctx.fill();
      dspr(SPR.crystal, pk.x-ox, pk.y-oy+bob, 2);
    }
  }
  // aktörer sorterade i y-led — träd, butiker och handlare deltar så man kan gå bakom dem
  const actors = [];
  for(const e of w.enemies) if(e.hp>0||e.type==='boss') actors.push({y:e.y, e, isE:true});
  for(const p of players) actors.push({y:p.y, p});
  for(const [ttx,tty] of treesVis) actors.push({y:(tty+1)*TS-2, tr:[ttx,tty]});
  for(const s of (w.shops||[])) actors.push({y:s.y+8, shop:s});
  for(const m of (w.merchants||[])) actors.push({y:m.y, merch:m});
  actors.sort((a,b)=>a.y-b.y);
  for(const a of actors){
    if(a.tr) dspr(treeImg, a.tr[0]*TS+16-ox, (a.tr[1]+1)*TS-oy-1, treeImg.tscale||2);
    else if(a.shop) drawShop(a.shop, ox, oy);
    else if(a.merch) dspr(merchImg, a.merch.x-ox, a.merch.y-oy, 2);
    else if(a.isE) drawEnemy(a.e, ox, oy);
    else drawPlayer(a.p, ox, oy);
  }
  // skott
  for(const s of shots){
    const sx=s.x-ox, sy=s.y-oy;
    if(s.kind==='arrow'||s.kind==='earrow'){
      ctx.strokeStyle = s.kind==='arrow'?'#f4f0e4':'#d8d8c8';
      ctx.lineWidth = 2;
      const a = Math.atan2(s.vy,s.vx);
      ctx.beginPath(); ctx.moveTo(sx-Math.cos(a)*7, sy-Math.sin(a)*7); ctx.lineTo(sx+Math.cos(a)*7, sy+Math.sin(a)*7); ctx.stroke();
      ctx.fillStyle='#f0c33c'; ctx.fillRect(sx+Math.cos(a)*7-1, sy+Math.sin(a)*7-1, 3, 3);
    } else if(s.kind==='fire'){
      ctx.fillStyle='#ff9c3f'; ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ffd24f'; ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill();
      parts.push({x:s.x,y:s.y,vx:0,vy:0,ttl:0.2,max:0.2,col:'#ff9c3f',sz:3});
    } else if(s.kind==='bolt'){
      ctx.fillStyle='#c8f0e8'; ctx.beginPath(); ctx.arc(sx,sy,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#7ae0c8'; ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
    } else if(s.kind==='slimeb'){
      ctx.fillStyle='#6fc84f'; ctx.beginPath(); ctx.arc(sx,sy,6,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#b8e89a'; ctx.beginPath(); ctx.arc(sx-1,sy-1,2,0,Math.PI*2); ctx.fill();
    }
  }
  // partiklar
  for(const pt of parts){
    if(pt.spark && HERO.ready){
      const fi = Math.min(3, Math.floor((1-pt.ttl/pt.max)*4));
      ctx.drawImage(OBJ.sparks[fi], pt.x-ox-12, pt.y-oy-12, 24, 24);
      continue;
    }
    ctx.globalAlpha = clamp(pt.ttl/pt.max,0,1);
    ctx.fillStyle = pt.col;
    ctx.fillRect(pt.x-ox-pt.sz/2, pt.y-oy-pt.sz/2, pt.sz, pt.sz);
  }
  ctx.globalAlpha = 1;
  // skyltar
  for(const s of w.signs){
    const sx=(s.tx+0.5)*TS, sy=(s.ty+0.5)*TS;
    if(players.some(p=>dist(p.x,p.y,sx,sy)<52)) drawBubble(sx-ox, sy-oy-24, s.txt);
  }
  // mörker i grottor
  if(w.dark) drawDarkness(ox, oy, w);
  // svävande text
  ctx.font = 'bold 15px monospace'; ctx.textAlign='center';
  for(const t of texts){
    ctx.globalAlpha = clamp(t.ttl/0.9,0,1);
    ctx.fillStyle = '#231a30'; ctx.fillText(t.txt, t.x-ox+1, t.y-oy+1);
    ctx.fillStyle = t.col; ctx.fillText(t.txt, t.x-ox, t.y-oy);
  }
  ctx.globalAlpha = 1;

  drawHUD();
  if(trans){
    ctx.fillStyle = 'rgba(13,11,22,'+(trans.phase==='out'?clamp(trans.t,0,1):clamp(1-trans.t,0,1))+')';
    ctx.fillRect(0,0,VW,VH);
  }
  if(paused) drawPause();
  if(state==='win') drawWin();
  if(state==='over') drawOver();
  if(toastT>0){
    ctx.font='bold 22px monospace'; ctx.textAlign='center';
    ctx.globalAlpha = clamp(toastT,0,1);
    ctx.fillStyle='#231a30'; ctx.fillText(toastMsg, VW/2+2, 132);
    ctx.fillStyle='#f0c33c'; ctx.fillText(toastMsg, VW/2, 130);
    ctx.globalAlpha = 1;
  }
}
let darkCv = null;
function drawDarkness(ox, oy, w){
  if(!darkCv){ darkCv = document.createElement('canvas'); darkCv.width=VW; darkCv.height=VH; }
  const g = darkCv.getContext('2d');
  g.globalCompositeOperation='source-over';
  g.fillStyle = 'rgba(8,6,20,0.62)';
  g.clearRect(0,0,VW,VH);
  g.fillRect(0,0,VW,VH);
  g.globalCompositeOperation='destination-out';
  const hole=(x,y,r)=>{
    const gr = g.createRadialGradient(x,y,r*0.3,x,y,r);
    gr.addColorStop(0,'rgba(0,0,0,1)'); gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr; g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
  };
  for(const p of players) hole(p.x-ox, p.y-oy-10, 150);
  const x0=Math.floor(ox/TS), y0=Math.floor(oy/TS);
  for(let ty=y0; ty<=y0+Math.ceil(VH/TS)+1; ty++)
    for(let tx=x0; tx<=x0+Math.ceil(VW/TS)+1; tx++)
      if(tileAt(w,tx,ty)===T.TORCH) hole(tx*TS-ox+16, ty*TS-oy+16, 90);
  const b = bossRef();
  if(b && b.active && !b.dead) hole(b.x-ox, b.y-oy-16, 120);
  ctx.drawImage(darkCv, 0, 0);
}
function drawPlayer(p, ox, oy){
  const sx = p.x-ox, sy = p.y-oy;
  shadow(sx, sy, 10);
  const bob = p.walkT ? Math.round(Math.sin(p.walkT)*1.5) : 0;
  const flip = p.fx<0;
  let alpha = 1;
  if(p.downed) alpha = 0.45;
  else if(p.invT>0 && (time*14|0)%2) alpha = 0.35;
  // hjälten: riktiga 4-riktningsframes när arken är laddade
  let drewSheet = false;
  if(HERO.ready && HERO.cls[p.cls.id]){
    const H = HERO.cls[p.cls.id];
    const dir = heroDir(p);
    ctx.save();
    ctx.globalAlpha = alpha;
    if(p.swingT>0){
      const prog = 1 - p.swingT/p.swingDur;
      const fi = Math.min(3, Math.floor((p.spin ? prog*8 : prog*4)) % 4);
      ctx.drawImage(H.attack[dir][fi], Math.round(sx-32), Math.round(sy-56+bob), 64, 64);
    } else {
      const fi = p.moving ? Math.floor(p.walkT)%4 : 0;
      ctx.drawImage(H.walk[dir][fi], Math.round(sx-16), Math.round(sy-60+bob), 32, 64);
    }
    ctx.restore();
    drewSheet = true;
  } else {
    dspr(p.cls.img, sx, sy+bob, 2, flip, alpha);
  }
  // sveptrail vid närstridshugg
  if(p.swingT>0 && (p.cls.id==='knight'||p.cls.id==='rogue')){
    const prog = 1 - p.swingT/p.swingDur;
    const sweep = p.swingArc;
    const a0 = p.swingAng - (p.spin ? 0 : sweep/2);
    const a = a0 + prog*sweep;
    ctx.lineWidth = 10;
    ctx.strokeStyle = 'rgba(244,240,228,'+(0.30*(1-prog*0.55)).toFixed(2)+')';
    ctx.beginPath(); ctx.arc(sx, sy-10, 25, Math.max(a0, a-0.95), a); ctx.stroke();
    ctx.lineWidth = 4;
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(sx, sy-10, 30, Math.max(a0, a-0.4), a); ctx.stroke();
    // ritat svärd bara i fallback-läget (arkets attackframes har svärdet inbyggt)
    if(!drewSheet){
      ctx.save();
      ctx.translate(sx, sy-10);
      ctx.rotate(a + Math.PI/2);
      ctx.translate(0, -8);
      const wsc = p.cls.id==='knight' ? 2 : 1.5;
      ctx.scale(wsc, wsc);
      ctx.drawImage(swordImg, -swordImg.width/2, -swordImg.height);
      ctx.restore();
    }
  }
  // spelarfärgprick
  ctx.fillStyle = p.color;
  ctx.fillRect(sx-3, drewSheet ? sy-66 : sy-p.cls.img.height*2-8, 6, 4);
  if(p.downed){
    // återupplivningscirkel
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(sx, sy-14, 14, 0, Math.PI*2); ctx.stroke();
    if(p.reviveT>0){
      ctx.strokeStyle='#8fe89a';
      ctx.beginPath(); ctx.arc(sx, sy-14, 14, -Math.PI/2, -Math.PI/2 + p.reviveT/3*Math.PI*2); ctx.stroke();
    }
  }
  if(p.flashT>0 && !drewSheet){
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=0.4; dspr(p.cls.img, sx, sy+bob, 2, flip);
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  }
}
function drawEnemy(e, ox, oy){
  const sx = e.x-ox, sy = e.y-oy;
  // ark-sprites för markfiender
  if(HERO.ready && (e.type==='slime'||e.type==='mini'||e.type==='bslime'||e.type==='skel')){
    shadow(sx, sy, e.r*0.9);
    let fr, sc = 1.5;
    if(e.type==='slime') fr = ENS.ball[Math.floor(time*6+e.x/13)%3];
    else if(e.type==='mini'){ fr = ENS.ball[Math.floor(time*8+e.x/7)%3]; sc = 1; }
    else if(e.type==='bslime') fr = ENS.flower[Math.floor(time*8+e.x/11)%8];
    else {
      const dir = Math.abs(e.fx)>Math.abs(e.fy) ? (e.fx>0?3:2) : (e.fy<0?1:0);
      fr = ENS.log[dir][Math.floor(time*6+e.y/17)%4];
      sc = 1.6;
    }
    const dw = fr.width*sc, dh = fr.height*sc;
    ctx.drawImage(fr, Math.round(sx-dw/2), Math.round(sy-dh+8), dw, dh);
    if(e.frozenT>0){
      ctx.fillStyle = 'rgba(140,200,255,0.4)';
      ctx.fillRect(Math.round(sx-dw/2), Math.round(sy-dh+8), dw, dh);
    }
    if(e.flashT>0){
      ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.5;
      ctx.drawImage(fr, Math.round(sx-dw/2), Math.round(sy-dh+8), dw, dh);
      ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
    }
    if(e.hp<e.maxhp){
      ctx.fillStyle='#231a30'; ctx.fillRect(sx-12, sy-dh+4, 24, 4);
      ctx.fillStyle='#e04848'; ctx.fillRect(sx-11, sy-dh+5, 22*clamp(e.hp/e.maxhp,0,1), 2);
    }
    return;
  }
  const img = SPR[e.type];
  if(!img) return;
  const sc = e.type==='boss'?3:2;
  const bob = e.fly ? Math.sin(time*6+e.x)*3 : 0;
  shadow(sx, sy, e.r*0.9);
  if(e.frozenT>0){
    dspr(img, sx, sy+8*(e.type==='boss'?0:0)+bob, sc, e.fx<0);
    ctx.fillStyle='rgba(140,200,255,0.4)';
    ctx.fillRect(sx-img.width*sc/2, sy-img.height*sc+bob, img.width*sc, img.height*sc);
  } else {
    const squash = (e.type==='slime'||e.type==='bslime'||e.type==='mini') ? Math.sin(time*5+e.y)*0.08 : 0;
    ctx.save();
    ctx.translate(Math.round(sx), Math.round(sy+bob));
    ctx.scale((e.fx<0?-1:1)*sc*(1+squash), sc*(1-squash));
    ctx.drawImage(img, -img.width/2, -img.height);
    ctx.restore();
  }
  if(e.flashT>0){
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=0.5; dspr(img, sx, sy+bob, sc, e.fx<0);
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  }
  // hp-bar för skadade (utom boss, som har egen)
  if(e.type!=='boss' && e.hp<e.maxhp){
    ctx.fillStyle='#231a30'; ctx.fillRect(sx-12, sy-img.height*2-8, 24, 4);
    ctx.fillStyle='#e04848'; ctx.fillRect(sx-11, sy-img.height*2-7, 22*clamp(e.hp/e.maxhp,0,1), 2);
  }
}
function drawBubble(x, y, txt){
  ctx.font = '13px monospace';
  const wd = ctx.measureText(txt).width+16;
  const bx = clamp(x-wd/2, 6, VW-wd-6);
  ctx.fillStyle='rgba(20,16,34,0.92)';
  ctx.fillRect(bx, y-24, wd, 22);
  ctx.strokeStyle='#f0c33c'; ctx.lineWidth=1;
  ctx.strokeRect(bx+0.5, y-23.5, wd-1, 21);
  ctx.fillStyle='#f4f0e4'; ctx.textAlign='left';
  ctx.fillText(txt, bx+8, y-9);
}
// hjärtan
function drawHearts(x, y, hp, maxhp){
  const n = Math.ceil(maxhp/2);
  for(let i=0;i<n;i++){
    const hx = x+i*15;
    const u = hp - i*2;
    if(HERO.ready){
      const img = u>=2 ? OBJ.heartFull : u===1 ? OBJ.heartHalf : OBJ.heartEmpty;
      ctx.drawImage(img, hx, y, 14, 14);
    } else {
      ctx.globalAlpha = 0.35;
      dspr(SPR.heart, hx+8, y+14, 2);
      ctx.globalAlpha = 1;
      if(u>=2) dspr(SPR.heart, hx+8, y+14, 2);
      else if(u===1){
        ctx.save(); ctx.beginPath(); ctx.rect(hx, y, 8, 16); ctx.clip();
        dspr(SPR.heart, hx+8, y+14, 2); ctx.restore();
      }
    }
  }
}

    ctx.font='bold 13px monospace'; ctx.textAlign='left';
    ctx.fillStyle='#f4f0e4';

  });
  // boss-bar
  const b = bossRef();
  if(b && b.active && !b.dead && cur==='du'){
    const bw = 400;
    ctx.fillStyle='rgba(13,11,22,0.8)';

    ctx.fillRect(x, y, cw, h);

    ctx.font='bold 17px monospace'; ctx.fillStyle=cls.color;

    ctx.font='11px monospace'; ctx.fillStyle='#c8c4d8';
    cls.desc.forEach((d,di)=>ctx.fillText(d, x+cw/2, y+124+di*15));
    // hjärtan + fart

    ctx.fillText('♥ '+(cls.hp/2)+'   fart '+'▸'.repeat(Math.round((cls.spd-85)/8)), x+cw/2, y+164);
    // vilka som valt detta kort

      ctx.font='bold 12px monospace';
      ctx.fillStyle = PCOLORS[pi];
      ctx.fillText('S'+(pi+1)+(j.ready?' ✓ REDO':''), x+cw/2, y+h+16+hi*15);
    });
  }
  // gå-med-rad (döljs när alla är redo och nedräkningen visas)
  const allReady = joiners.length>0 && joiners.every(j=>j.ready);
  ctx.font='bold 16px monospace';
  ctx.fillStyle = joiners.length ? '#8a86a0' : '#f0c33c';
  const blink = (time*2|0)%2===0;
  if(!allReady && (blink || joiners.length)) ctx.fillText('Tryck ATTACK för att gå med!', VW/2, 400);
  // anslutna spelare
  joiners.forEach((j,i)=>{
    ctx.font='13px monospace'; ctx.fillStyle=PCOLORS[i];
    ctx.fillText('Spelare '+(i+1)+' — '+ctrlLabel(j.ctrlId)+(j.ready?' — REDO!':' — väljer...'), VW/2, 424+i*17);
  });
  // nedräkning
  if(joiners.length>0 && joiners.every(j=>j.ready)){
    ctx.font='bold 30px monospace'; ctx.fillStyle='#f0c33c';
    ctx.fillText('Startar om '+Math.ceil(countdown)+'...', VW/2, 400);
  }
  // mobilanslutning
  if(NET.open){
    ctx.font='bold 14px monospace'; ctx.fillStyle='#8fe89a';
    ctx.fillText('Mobil: skanna QR-koden eller öppna '+joinHost()+' och skriv kod '+NET.code.toUpperCase(), VW/2, VH-62);
  }
  // kontroller
  ctx.font='12px monospace'; ctx.fillStyle='#6a6580';
  ctx.fillText('Spelare 1: WASD + Blanksteg + E   ·   Spelare 2: Pilar + Enter + Hö.Shift   ·   Handkontroll/mobil: A/ATTACK för att gå med', VW/2, VH-40);
  ctx.fillText('Vänster/höger = välj hjälte · ATTACK = redo · SPECIAL = ångra · M = musik · Klicka på spelet om tangenterna inte svarar', VW/2, VH-22);
}

// delad styrspak+knapp-bindning: skriver till st {x,y,a,s} och kallar onChange
function bindPadControls(st, onChange){
  const zone = document.getElementById('stickZone');
  const base = document.getElementById('stickBase'), knob = document.getElementById('stickKnob');
  const hint = document.getElementById('stickHint');
  let sid = null, ox = 0, oy = 0;
  const place = (el,x,y,sz)=>{ el.style.left = (x-sz/2)+'px'; el.style.top = (y-sz/2)+'px'; };
  zone.addEventListener('pointerdown', e=>{
    if(sid!==null) return;
    sid = e.pointerId;
    try{ zone.setPointerCapture(sid); }catch(err){}
    const r = zone.getBoundingClientRect();
    ox = e.clientX-r.left; oy = e.clientY-r.top;
    hint.style.display = 'none';
    base.style.display = 'block'; knob.style.display = 'block';
    place(base,ox,oy,120); place(knob,ox,oy,56);
  });
  zone.addEventListener('pointermove', e=>{
    if(e.pointerId!==sid) return;
    const r = zone.getBoundingClientRect();
    let dx = e.clientX-r.left-ox, dy = e.clientY-r.top-oy;
    const d = Math.hypot(dx,dy), max = 56;
    if(d>max){ dx = dx/d*max; dy = dy/d*max; }
    place(knob, ox+dx, oy+dy, 56);
    const nx = dx/max, ny = dy/max;
    st.x = Math.abs(nx)<0.25?0:nx; st.y = Math.abs(ny)<0.25?0:ny;
    onChange();
  });
  const endStick = e=>{
    if(e.pointerId!==sid) return;
    sid = null; st.x = 0; st.y = 0;
    base.style.display = 'none'; knob.style.display = 'none';
    onChange();
  };
  zone.addEventListener('pointerup', endStick);
  zone.addEventListener('pointercancel', endStick);
  const bindBtn = (el, key)=>{
    el.addEventListener('pointerdown', e=>{ e.preventDefault(); st[key] = true; el.classList.add('on'); onChange(); });
    const off = ()=>{ st[key] = false; el.classList.remove('on'); onChange(); };
    el.addEventListener('pointerup', off);
    el.addEventListener('pointercancel', off);
    el.addEventListener('pointerleave', off);
  };
  bindBtn(document.getElementById('btnA'), 'a');
  bindBtn(document.getElementById('btnB'), 's');
  document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault());
}

function startCtrl(code){
  if(MODE==='ctrl') return;
  MODE = 'ctrl';
  document.getElementById('wrap').style.display = 'none';
  document.getElementById('chooseUI').style.display = 'none';
  const padUI = document.getElementById('padUI');
  padUI.style.display = 'flex';
  const top = document.getElementById('padTop');
  const st = {x:0, y:0, a:false, s:false};
  let conn = null, connected = false;
  const send = ()=>{
    if(connected){ try{ conn.send({t:'i', x:Math.round(st.x*100)/100, y:Math.round(st.y*100)/100, a:st.a, s:st.s}); }catch(e){} }
  };
  setInterval(send, 100);
  top.textContent = 'Ansluter till rum '+code.toUpperCase()+'…';
  const peer = new Peer(ICE_OPTS);
  let attempts = 0;
  peer.on('disconnected', ()=>{ try{ peer.reconnect(); }catch(e){} });
  const tryConnect = ()=>{
    attempts++;
    conn = peer.connect('slemkung-'+code.toLowerCase(), { reliable: true });
    conn.on('open', ()=>{ connected = true; attempts = 0; top.innerHTML = '<b style="color:#8fe89a">Ansluten!</b> Tryck ATTACK för att gå med i spelet.'; });
    conn.on('data', d=>{
      if(!d || d.t!=='you') return;
      if(d.st==='lobby') top.innerHTML = 'Ansluten till <b>'+code.toUpperCase()+'</b> — tryck ATTACK för att gå med!';
      else if(d.st==='select') top.innerHTML = '<span style="color:'+d.color+'">&#9632; Spelare '+d.n+'</span> — '+d.cls
        + (d.ready ? ' — <b style="color:#8fe89a">REDO!</b>' : ' — styr åt sidorna för att välja, ATTACK = redo/hoppa in');
      else {
        const hearts = '&#9829;'.repeat(Math.max(0,Math.ceil(d.hp/2))) + '&#9825;'.repeat(Math.max(0,Math.ceil((d.maxhp-d.hp)/2)));
        top.innerHTML = '<span style="color:'+d.color+'">&#9632; '+d.cls+'</span> <span style="color:#ff8a8a">'+hearts+'</span> '
          + (d.downed ? '<b style="color:#ff6a5e">NERE! En vän kan väcka dig!</b>'
             : (d.cd>=1 ? '<b style="color:#f0c33c">SPECIAL REDO</b>' : 'special laddar…'));
      }
    });
    conn.on('close', ()=>{
      if(connected){ connected = false; top.innerHTML = '<b style="color:#ff6a5e">Tappade anslutningen.</b> Försöker igen…'; setTimeout(tryConnect, 2000); }
    });
    conn.on('error', ()=>{});
  };
  const retry = ()=>{
    if(connected) return;
    if(attempts < 6){
      top.innerHTML = 'Hittar inte rummet <b>'+code.toUpperCase()+'</b> — försöker igen ('+attempts+'/5)…';
      setTimeout(tryConnect, 2500);
    } else {
      top.innerHTML = '<b style="color:#ff6a5e">Kunde inte ansluta.</b> Kolla att koden stämmer och att spelet är igång på stora skärmen, ladda sedan om sidan.';
    }
  };
  peer.on('open', tryConnect);
  peer.on('error', err=>{
    if(err && err.type==='peer-unavailable') retry();
    else if(!connected && attempts>0 && err && err.type!=='disconnected') retry();
  });
  // joystick
  const zone = document.getElementById('stickZone');
  const base = document.getElementById('stickBase'), knob = document.getElementById('stickKnob');
  const hint = document.getElementById('stickHint');
  let sid = null, ox = 0, oy = 0;
  const place = (el,x,y,sz)=>{ el.style.left = (x-sz/2)+'px'; el.style.top = (y-sz/2)+'px'; };
  zone.addEventListener('pointerdown', e=>{
    if(sid!==null) return;
    sid = e.pointerId;
    try{ zone.setPointerCapture(sid); }catch(err){}
    const r = zone.getBoundingClientRect();
    ox = e.clientX-r.left; oy = e.clientY-r.top;
    hint.style.display = 'none';
    base.style.display = 'block'; knob.style.display = 'block';
    place(base,ox,oy,120); place(knob,ox,oy,56);
  });
  zone.addEventListener('pointermove', e=>{
    if(e.pointerId!==sid) return;
    const r = zone.getBoundingClientRect();
    let dx = e.clientX-r.left-ox, dy = e.clientY-r.top-oy;
    const d = Math.hypot(dx,dy), max = 56;
    if(d>max){ dx = dx/d*max; dy = dy/d*max; }
    place(knob, ox+dx, oy+dy, 56);
    const nx = dx/max, ny = dy/max;
    st.x = Math.abs(nx)<0.25?0:nx; st.y = Math.abs(ny)<0.25?0:ny;
    send();
  });
  const endStick = e=>{
    if(e.pointerId!==sid) return;
    sid = null; st.x = 0; st.y = 0;
    base.style.display = 'none'; knob.style.display = 'none';
    send();
  };
  zone.addEventListener('pointerup', endStick);
  zone.addEventListener('pointercancel', endStick);
  // knappar
  const bindBtn = (el, key)=>{
    el.addEventListener('pointerdown', e=>{ e.preventDefault(); st[key] = true; el.classList.add('on'); send(); });
    const off = ()=>{ st[key] = false; el.classList.remove('on'); send(); };
    el.addEventListener('pointerup', off);
    el.addEventListener('pointercancel', off);
    el.addEventListener('pointerleave', off);
  };
  bindBtn(document.getElementById('btnA'), 'a');
  bindBtn(document.getElementById('btnB'), 's');
  // stoppa iOS-scroll/zoom
  document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault());
}

// ===================== HUVUDLOOP & BOOT =====================
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now-lastT)/1000);
  lastT = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
window.__NET = NET;
window.__DBG = ()=>({state, cur, coins, joiners:joiners.length, players:players.length,
  ci:joiners[0]?joiners[0].ci:null, ready:joiners[0]?joiners[0].ready:null,
  px:players[0]?Math.round(players[0].x):null, py:players[0]?Math.round(players[0].y):null,
  up:players[0]?players[0].up:null, hp:players[0]?players[0].hp:null, maxhp:players[0]?players[0].maxhp:null});
window.__GIVE = n=>{ coins += n; };
window.__TILE = (tx,ty)=>tileAt(CW(), tx, ty);
window.__FINDBUSH = ()=>{
  const w = CW();
  for(let ty=12;ty<w.mh-2;ty++) for(let tx=2;tx<w.mw-2;tx++)
    if(w.t[ty*w.mw+tx]===T.BUSH && !SOLID.has(w.t[(ty+1)*w.mw+tx])) return [tx,ty];
  return null;
};
window.__SHOTS = ()=>shots.map(s=>({k:s.kind, x:Math.round(s.x), y:Math.round(s.y), vx:Math.round(s.vx), vy:Math.round(s.vy)}));
window.__TP = (tx,ty)=>{ players.forEach((p,i)=>{ p.x=(tx+i*0.8)*TS; p.y=ty*TS; }); camSnap = true; };
if(MODE==='ctrl'){
  startCtrl(URLQ.get('room'));
} else if(MODE==='choose'){
  const chooseUI = document.getElementById('chooseUI');
  chooseUI.style.display = 'flex';
  // pointerup + click med dubbelskydd — iOS kan svälja rena click-händelser
  const onTap = (el, fn)=>{
    let last = 0;
    const h = e=>{ const now = performance.now(); if(now-last<400) return; last = now; fn(e); };
    el.addEventListener('pointerup', h);
    el.addEventListener('click', h);
  };
  onTap(document.getElementById('chJoin'), ()=>{
    document.getElementById('chJoin').style.display = 'none';
    document.getElementById('codeRow').style.display = 'flex';
    document.getElementById('codeInput').focus();
  });
  const go = ()=>{
    const code = document.getElementById('codeInput').value.trim();
    if(code.length===4) startCtrl(code);
  };
  onTap(document.getElementById('chGo'), go);
  document.getElementById('codeInput').addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
  let hostStarted = false;
  onTap(document.getElementById('chHost'), ()=>{
    if(hostStarted) return; hostStarted = true;
    chooseUI.style.display = 'none';
    startHost();
    if(IS_TOUCH) enableLocalPad();
    lastT = performance.now();
    requestAnimationFrame(frame);
  });
} else {
  startHost();
  if(IS_TOUCH && Math.min(window.innerWidth, window.innerHeight) < 900) enableLocalPad();
  requestAnimationFrame(frame);
}
